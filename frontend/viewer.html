<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer &mdash; cognee-load-theory</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="/">cognee-load-theory</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/viewer.html" class="active">Viewer</a>
      <a href="/docs">API docs</a>
    </div>
  </nav>

  <main>
    <section class="card">
      <h2>Ingest</h2>
      <textarea id="ingest-text" rows="3" placeholder="Text to remember&hellip;"></textarea>
      <button id="ingest-btn">Ingest</button>
    </section>

    <section class="card">
      <h2>Load score</h2>
      <button data-get="/api/load" data-target="load-out">Refresh</button>
      <pre id="load-out"></pre>
    </section>

    <section class="card">
      <h2>Memory</h2>
      <button data-get="/api/memory" data-target="memory-out">List</button>
      <pre id="memory-out"></pre>
    </section>

    <section class="card">
      <h2>Tasks</h2>
      <button data-get="/api/tasks" data-target="tasks-out">List</button>
      <pre id="tasks-out"></pre>
    </section>

    <section class="card">
      <h2>Cognee Graph</h2>
      <button data-get="/api/cognee-graph" data-target="graph-out">Load</button>
      <pre id="graph-out"></pre>
    </section>

    <section class="card">
      <h2>Action</h2>
      <input id="action-name" type="text" placeholder="action name" value="ping" />
      <button id="action-btn">Run</button>
      <pre id="action-out"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>

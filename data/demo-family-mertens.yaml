    likely_entities:
      - Document
      - Task
      - SchoolSupply
      - Event
    likely_inferences:
      - creates preparation checklist
      - tasks may need owners
      - source confidence may depend on OCR quality

  - id: channel_mind_space_action
    type: memory_action
    provider: mind_space
    label: Mind Space Action
    examples:

      - travel planning needed
      - parents should block time
      - preparation tasks are likely missing

  - id: channel_mail
    type: mail
    provider: gmail
    label: Gmail / Mail
    examples:
      - Email from school
      - Forwarded message from another parent
      - Attachment notification
    example_input: "Betreff: Einschulung Lila Mertens - bitte bestaetigen Sie die Teilnahme bis 15.08.2026."
    likely_entities:

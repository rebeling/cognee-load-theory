    memory_update:
      - source: Christian
        relation: owns
        target: Plan route
      - source: Plan route
        relation: has_reminder
        target: "2026-08-15T09:00:00+02:00"
    change_report:
      - Christian now owns route planning.
      - Missing-owner warning removed.
      - Reminder scheduled.

change_set_pipeline:
  intent: "Assign route planning to Christian and remind him one week before."
  steps:
    - Extract intended change from user action.
    - Compare intended change with existing memory.
    - Create MemoryChangeSet.
    - Apply MemoryChangeSet to Cognee.
    - Report what changed.


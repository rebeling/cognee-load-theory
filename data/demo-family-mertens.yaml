      - Quick note
      - Agent chat command
      - Mind Space note
    example_input: "Lila needs a sports bag for school."
    likely_entities:
      - Person
      - Task
      - Topic
    likely_inferences:
      - new school-related task
      - affects Lila
      - missing owner

  - id: channel_voice_note
    type: voice_transcript
    provider: phone_transcription
    label: Voice Note Transcript
    examples:
      - Voice memo
      - Dictated reminder

  mind_space_visualization:
    - Lila is the center of the school-start cluster.
    - Vera and Christian are connected through owned tasks.
    - Unassigned tasks float as open loops.
    - The school-start cluster is high priority.
    - Travel-related nodes connect Bernau and Biesenthal.

  user_action:

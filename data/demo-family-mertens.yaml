input_channels:
  - id: channel_google_calendar
    type: calendar
    provider: google_calendar
    label: Google Calendar
    examples:
      - Google Calendar event
      - ICS import
      - Manual calendar entry
    example_input: "Einschulung Lila, 22.08.2026, 10:00, Grundschule Biesenthal"
    likely_entities:
      - Event
      - Date
      - Place
      - Person
    likely_inferences:

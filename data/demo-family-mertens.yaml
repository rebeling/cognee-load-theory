      - DueDate
      - Ownership
    likely_inferences:
      - Christian owns school bag task
      - task belongs to school-start cluster
      - task has due date before event

  - id: channel_school_portal
    type: school_message
    provider: school_portal
    label: School Portal
    examples:
      - PDF letter
      - School portal message
      - Uploaded school form
    example_input: "Bitte bringen Sie zur Einschulung die Aufnahmebestaetigung und ein Passfoto mit."
    likely_entities:
      - Document
      - Task
      - School
      - Deadline
    likely_inferences:
      - creates preparation task
      - affects Lila
      - needs owner
      - may have due date before event

  - id: channel_parent_chat
    type: chat

    example_input: "Remember to ask whether Lara and Paul have school on Lila's Einschulung day."
    likely_entities:
      - Person
      - Task
      - School
      - Event
    likely_inferences:
      - creates sibling schedule check task
      - affects Lara and Paul
      - missing owner

  - id: channel_scanned_letter
    type: document_scan
    provider: paper_scan
    label: Scanned Paper Letter
    examples:
      - OCR school letter
      - Printed checklist
      - Photo of paper note

    example_input: "Christian kuemmert sich um den Schulranzen. Vera fragt morgen in der Schule wegen der Uhrzeit nach."
    likely_entities:
      - Person
      - Task
      - Ownership
      - Reminder
    likely_inferences:
      - Christian owns school bag task
      - Vera owns confirmation task
      - reminder may be useful

  - id: channel_manual_note
    type: note
    provider: mind_space
    label: Manual Note

        depends_on: School documents
      - source: School start
        depends_on: Ceremony time confirmation
      - source: Travel planning
        depends_on: Location and time

  coordination_graph:
    edges:
      - source: Lila
        relation: has_event
        target: Einschulung
      - source: Einschulung
        relation: takes_place_at
        target: Grundschule Biesenthal
      - source: Einschulung
        relation: creates_task
        target: Confirm ceremony time
      - source: Einschulung
        relation: creates_task
        target: Buy school bag
      - source: Einschulung
        relation: creates_task
        target: Plan route
      - source: Vera
        relation: owns
        target: Confirm ceremony time
